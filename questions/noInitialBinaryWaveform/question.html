<pl-question-panel>
    <p>
        Complete <code>Q</code> with the sequence
        <code>0, 0, 1, 1</code>.
    </p>
    <p>
        This question exposes the raw binary waveform case where the editable
        row has no fixed initial value. The <code>Q</code> row defines
        <code>correct_answers</code> without an <code>initial</code> value.
    </p>
</pl-question-panel>

<pl-waveform
    answers-name="no_initial_binary"
    label="Binary row with no initial value"
    hscale="1.5"
    feedback="row"
    input-mode="text">
</pl-waveform>
